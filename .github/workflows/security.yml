###############################################################################
# Security Pipeline – Shift-Left CI/CD  (Full DevSecOps Stack)
#
# Fase 1 : Hardening + SCA      (Gitleaks · Trivy · License · SBOM)
# Fase 2 : SAST                 (Semgrep – OWASP Top 10 Quality Gate)
# Fase 3 : DAST                 (OWASP ZAP Baseline)
# Fase 5 : Container Security   (Hadolint · Trivy image scan)
# Fase 6 : Dependency Review    (GitHub native – PR only)
# Fase 7 : Supply Chain         (OSSF Scorecard)
# Fase 8 : API Security Tests   (Newman / Postman)
###############################################################################
name: "🔒 Security Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── Mínimo privilegio global ─────────────────────────────────────────────────
permissions: read-all

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 1-A ▸ Escaneo de secretos con Gitleaks
  # ═══════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: "🔑 Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 1-B ▸ SCA – Escaneo de dependencias con Trivy
  # ═══════════════════════════════════════════════════════════════════════════
  sca-backend:
    name: "📦 SCA Backend (Trivy)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: cd TribeBackend && npm ci --ignore-scripts

      - name: Run Trivy FS scan (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeBackend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Run Trivy FS scan – SARIF (backend)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeBackend
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  sca-frontend:
    name: "📦 SCA Frontend (Trivy)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: cd TribeFrontend && npm ci --ignore-scripts

      - name: Run Trivy FS scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeFrontend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Run Trivy FS scan – SARIF (frontend)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeFrontend
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 1-C ▸ License Compliance (Trivy)
  # ═══════════════════════════════════════════════════════════════════════════
  license-check:
    name: "📜 License Compliance"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend deps
        run: cd TribeBackend && npm ci --ignore-scripts

      - name: Check licenses (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeBackend
          scanners: license
          severity: UNKNOWN,HIGH,CRITICAL
          exit-code: "0"
          format: table

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 1-D ▸ SBOM Generation (CycloneDX)
  # ═══════════════════════════════════════════════════════════════════════════
  sbom:
    name: "📋 SBOM (CycloneDX)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend deps
        run: cd TribeBackend && npm ci --ignore-scripts

      - name: Generate SBOM – Backend (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeBackend
          format: cyclonedx
          output: sbom-backend.cdx.json

      - name: Install frontend deps
        run: cd TribeFrontend && npm ci --ignore-scripts

      - name: Generate SBOM – Frontend (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: TribeFrontend
          format: cyclonedx
          output: sbom-frontend.cdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-backend.cdx.json
            sbom-frontend.cdx.json

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 2 ▸ SAST – Semgrep con Quality Gate (OWASP Top 10)
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: "🛡️ SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep – OWASP Top 10 rules
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/nodejs" \
            --config "p/react" \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            TribeBackend TribeFrontend

      - name: Quality Gate – fail on Critical/High
        run: |
          echo "──────────────────────────────────────"
          echo "🔍 Quality Gate: checking for CRITICAL/HIGH findings..."
          echo "──────────────────────────────────────"
          ERRORS=$(python3 -c "
          import json, sys
          with open('semgrep-results.sarif') as f:
              sarif = json.load(f)
          count = 0
          for run in sarif.get('runs', []):
              for result in run.get('results', []):
                  if result.get('level') == 'error':
                      count += 1
          print(count)
          ")
          echo "Found $ERRORS critical/high findings"
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Quality Gate FAILED: $ERRORS critical/high vulnerabilities found"
            semgrep scan \
              --config "p/owasp-top-ten" \
              --config "p/nodejs" \
              --config "p/react" \
              --severity ERROR \
              TribeBackend TribeFrontend || true
            exit 1
          fi
          echo "✅ Quality Gate PASSED"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 3 ▸ DAST – OWASP ZAP Baseline contra el backend
  # ═══════════════════════════════════════════════════════════════════════════
  dast:
    name: "⚡ DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: [sast, sca-backend]
    if: ${{ !cancelled() && needs.sast.result != 'failure' }}
    permissions:
      contents: read
      issues: write
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/tribe_test
      MONGODB_URI_LOCAL: mongodb://localhost:27017/tribe_test
      JWT_SECRET: ci-test-secret-not-real
      NODE_ENV: Development
      PORT: 8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd TribeBackend && npm ci

      - name: Start backend server
        run: |
          cd TribeBackend
          node server/index.js &
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ Server is up!"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ""
          allow_issue_writing: false
          fail_action: true
          cmd_options: "-I"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 5 ▸ Container Security – Hadolint + Trivy Image Scan
  # ═══════════════════════════════════════════════════════════════════════════
  dockerfile-lint:
    name: "🐳 Dockerfile Lint (Hadolint)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  container-scan:
    name: "🐳 Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [dockerfile-lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tribe-backend:ci .

      - name: Trivy image scan (table)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: tribe-backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy image scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: tribe-backend:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 6 ▸ Dependency Review (solo en PRs)
  # ═══════════════════════════════════════════════════════════════════════════
  dependency-review:
    name: "🔍 Dependency Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always
          deny-licenses: AGPL-3.0-only, GPL-3.0-only
          warn-only: false

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 7 ▸ OSSF Scorecard – Supply Chain Security Posture
  # ═══════════════════════════════════════════════════════════════════════════
  scorecard:
    name: "🏆 OSSF Scorecard"
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Scorecard SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 8 ▸ API Security Tests (Newman / Postman)
  # ═══════════════════════════════════════════════════════════════════════════
  api-security-tests:
    name: "🧪 API Security Tests"
    runs-on: ubuntu-latest
    needs: [sast, sca-backend]
    if: ${{ !cancelled() && needs.sast.result != 'failure' }}
    permissions:
      contents: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/tribe_test
      MONGODB_URI_LOCAL: mongodb://localhost:27017/tribe_test
      JWT_SECRET: ci-test-secret-not-real
      NODE_ENV: Development
      PORT: 8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd TribeBackend && npm ci

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start backend server
        run: |
          cd TribeBackend
          node server/index.js &
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ Server is up!"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run API Security Tests
        run: |
          newman run tests/security/api-security-tests.postman.json \
            --env-var "baseUrl=http://localhost:8080" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export api-security-report.html \
            --color on || true

      - name: Upload API Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-security-report
          path: api-security-report.html

  # ═══════════════════════════════════════════════════════════════════════════
  # RESUMEN – Gate final
  # ═══════════════════════════════════════════════════════════════════════════
  security-gate:
    name: "🏁 Security Gate"
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - sca-backend
      - sca-frontend
      - license-check
      - sbom
      - sast
      - dast
      - dockerfile-lint
      - container-scan
      - api-security-tests
    if: always()
    permissions:
      contents: read
    steps:
      - name: Evaluate results
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "        🔒 Security Pipeline Summary"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "  🔑 Secret Scan     : ${{ needs.secret-scan.result }}"
          echo "  📦 SCA Backend     : ${{ needs.sca-backend.result }}"
          echo "  📦 SCA Frontend    : ${{ needs.sca-frontend.result }}"
          echo "  📜 License Check   : ${{ needs.license-check.result }}"
          echo "  📋 SBOM Generation : ${{ needs.sbom.result }}"
          echo "  🛡️  SAST (Semgrep)  : ${{ needs.sast.result }}"
          echo "  ⚡ DAST (ZAP)      : ${{ needs.dast.result }}"
          echo "  🐳 Dockerfile Lint : ${{ needs.dockerfile-lint.result }}"
          echo "  🐳 Container Scan  : ${{ needs.container-scan.result }}"
          echo "  🧪 API Security    : ${{ needs.api-security-tests.result }}"
          echo ""
          echo "═══════════════════════════════════════════════════"
          
          FAILED=0
          
          # ── BLOCKERS (fail the gate) ──
          if [[ "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "❌ BLOCKED: Secrets detected in codebase!"
            FAILED=1
          fi
          if [[ "${{ needs.sast.result }}" == "failure" ]]; then
            echo "❌ BLOCKED: Critical/High SAST findings (OWASP Top 10)!"
            FAILED=1
          fi
          
          # ── WARNINGS (report but don't block) ──
          if [[ "${{ needs.sca-backend.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: SCA backend found vulnerable dependencies"
          fi
          if [[ "${{ needs.sca-frontend.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: SCA frontend found vulnerable dependencies"
          fi
          if [[ "${{ needs.dast.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: DAST found potential runtime vulnerabilities"
          fi
          if [[ "${{ needs.container-scan.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: Container image has vulnerable packages"
          fi
          if [[ "${{ needs.dockerfile-lint.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: Dockerfile linting issues found"
          fi
          if [[ "${{ needs.license-check.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: Potential license compliance issues"
          fi
          if [[ "${{ needs.api-security-tests.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: API security tests had failures"
          fi
          
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "🚫 Security Gate FAILED – merge blocked"
            exit 1
          fi
          
          echo ""
          echo "✅ Security Gate PASSED"
